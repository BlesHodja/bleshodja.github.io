<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyan</title>
  <style>
    body {
      margin: 0;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 100px 20px 20px;
    }
    h1 {
      background: linear-gradient(to right, darkcyan, cyan);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 4em;
      margin-bottom: 20px;
    }
    .buttons {
      margin-top: 20px;
    }
    button {
      background-color: mediumcyan;
      background-color: #00bcd4;
      border: none;
      color: white;
      padding: 12px 24px;
      margin: 5px;
      font-size: 1em;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #0097a7;
    }
  </style>
</head>
<body>
  <h1>Cyan</h1>
  <div class="buttons" id="buttonContainer">Loading buttons...</div>

  <script>
    (async () => {
      const container = document.getElementById("buttonContainer");
      try {
        const res = await fetch("https://bleshodja.github.io/data-buttons.json");
        const json = await res.json();

        container.innerHTML = ""; // Clear loading text

        json.forEach(btn => {
          if (btn.name && Array.isArray(btn.htmlurl)) {
            const button = document.createElement("button");
            button.textContent = btn.name;
            button.onclick = () => {
              const origin = location.origin; // e.g., https://cyanstudiosdev.github.io
              const path = btn.htmlurl[0][0]; // e.g., /minecraft.html
              location.href = origin + path;
            };
            container.appendChild(button);
          }
        });
      } catch (e) {
        container.innerHTML = "<p style='color:red;'>Failed to load buttons.</p>";
        console.error(e);
      }
    })();
  </script>
</body>
</html>
