<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>👌 Wall</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: white;
      color: black;
      font-size: 16px;
      line-height: 16px;
      font-family: sans-serif;
    }
    pre {
      margin: 0;
      white-space: pre;
    }
  </style>
</head>
<body>
  <pre id="emojiWall"></pre>
  <script>
    const emoji = '👌';
    const fontSize = 16;
    const rows = Math.floor(window.innerHeight / fontSize);
    const cols = Math.floor(window.innerWidth / fontSize);
    const wall = Array.from({ length: rows }, () => emoji.repeat(cols)).join('\n');
    document.getElementById('emojiWall').textContent = wall;
  </script>
</body>
</html>
