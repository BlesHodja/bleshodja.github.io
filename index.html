<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cyan</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1e20;
      --fg: #ffffff;
      --btn: #00bcd4;
      --btn-hover: #0097a7;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 100px;
      min-height: 100vh;
    }

    h1 {
      font-size: 4em;
      background: linear-gradient(to right, darkcyan, cyan);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      background-color: var(--btn);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1em;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
      width: 200px;
      text-align: center;
    }

    button:hover {
      background-color: var(--btn-hover);
    }

    #buttonContainer {
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Cyan</h1>
  <div class="buttons" id="buttonContainer">Loading buttons...</div>

  <script>
    (async () => {
      const container = document.getElementById("buttonContainer");
      try {
        const res = await fetch("https://bleshodja.github.io/data-buttons.json");
        const json = await res.json();

        container.innerHTML = ""; // Clear loading text

        json.forEach(btn => {
          if (btn.name && Array.isArray(btn.htmlurl)) {
            const button = document.createElement("button");
            button.textContent = btn.name;
            button.onclick = () => {
              const base = "https://bleshodja.github.io";
              const path = btn.htmlurl[0][0]; // like "/minecraft.html"
              window.location.href = base + path;
            };
            container.appendChild(button);
          }
        });
      } catch (e) {
        container.innerHTML = "<p style='color:red;'>Failed to load buttons.</p>";
        console.error(e);
      }
    })();
  </script>
</body>
</html>
